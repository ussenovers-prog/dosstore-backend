// ============================================================
// API CLIENT
// ============================================================
const API_BASE = window.location.hostname === 'localhost'
  ? 'http://localhost:3001/api'
  : (window.location.hostname.endsWith('mule.page') ? 'https://dosstore-backend.onrender.com/api' : '/api');

const api = {
  token: localStorage.getItem('accessToken'),
  refreshToken: localStorage.getItem('refreshToken'),
  user: JSON.parse(localStorage.getItem('user') || 'null'),

  setAuth(data) {
    this.token = data.tokens.accessToken;
    this.refreshToken = data.tokens.refreshToken;
    this.user = data.user;
    localStorage.setItem('accessToken', this.token);
    localStorage.setItem('refreshToken', this.refreshToken);
    localStorage.setItem('user', JSON.stringify(this.user));
  },

  clearAuth() {
    this.token = null;
    this.refreshToken = null;
    this.user = null;
    localStorage.removeItem('accessToken');
    localStorage.removeItem('refreshToken');
    localStorage.removeItem('user');
  },

  async request(method, path, body = null) {
    const headers = { 'Content-Type': 'application/json' };
    if (this.token) headers['Authorization'] = `Bearer ${this.token}`;
    try {
      const res = await fetch(`${API_BASE}${path}`, {
        method, headers, body: body ? JSON.stringify(body) : null
      });
      if (res.status === 401 && this.refreshToken) {
        try {
          const rRes = await fetch(`${API_BASE}/auth/refresh`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ refreshToken: this.refreshToken })
          });
          if (rRes.ok) {
            const rData = await rRes.json();
            this.token = rData.data.accessToken;
            this.refreshToken = rData.data.refreshToken;
            localStorage.setItem('accessToken', this.token);
            localStorage.setItem('refreshToken', this.refreshToken);
            headers['Authorization'] = `Bearer ${this.token}`;
            const retryRes = await fetch(`${API_BASE}${path}`, { method, headers, body: body ? JSON.stringify(body) : null });
            return retryRes.json();
          }
        } catch(e) { /* fall through */ }
        this.clearAuth();
        showLogin();
        throw new Error('Session expired');
      }
      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || 'Request failed');
      return data;
    } catch (e) {
      if (e.message === 'Failed to fetch') {
        console.warn('API not available, using demo data');
        return getDemoData(method, path);
      }
      throw e;
    }
  },

  get(path) { return this.request('GET', path); },
  post(path, body) { return this.request('POST', path, body); },
  patch(path, body) { return this.request('PATCH', path, body); },
  delete(path) { return this.request('DELETE', path); },
};

let currentPage = 'dashboard';
let charts = {};

function getFilters() {
  const storeId = document.getElementById('storeFilter').value;
  const dateFrom = document.getElementById('dateFrom').value;
  const dateTo = document.getElementById('dateTo').value;
  let params = new URLSearchParams();
  if (storeId) params.set('storeId', storeId);
  if (dateFrom) params.set('dateFrom', dateFrom);
  if (dateTo) params.set('dateTo', dateTo);
  return params.toString() ? `?${params.toString()}` : '';
}

function appendQueryParam(query, key, value) {
  const params = new URLSearchParams(query.startsWith('?') ? query.slice(1) : query);
  if (value) params.set(key, value);
  return params.toString() ? `?${params.toString()}` : '';
}

function fmt(n) { return new Intl.NumberFormat('ru-RU').format(Math.round(n)); }
function fmtMoney(n) { return new Intl.NumberFormat('ru-RU', {style:'currency',currency:'RUB',maximumFractionDigits:0}).format(n); }
function fmtPct(n) { return `${n.toFixed(1)}%`; }
function fmtCount(n) { return n === null || n === undefined ? '—' : fmt(n); }
function fmtDateTime(value) { return value ? new Date(value).toLocaleString('ru-RU', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'}) : '—'; }
function fmtDate(value) { return value ? new Date(value).toLocaleDateString('ru-RU') : '—'; }
function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, char => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[char]));
}

function showLogin() {
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('appShell').classList.add('hidden');
}

function showApp() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appShell').classList.remove('hidden');
  const u = api.user;
  if (u) {
    document.getElementById('userName').textContent = u.fullName;
    document.getElementById('userEmail').textContent = u.email;
    document.getElementById('userAvatar').textContent = u.fullName.charAt(0).toUpperCase();
    document.getElementById('currentUserRole').textContent = u.role === 'owner' ? 'Владелец' : 'Сотрудник';
    if (u.role === 'employee' && u.storeId) {
      document.getElementById('storeFilter').value = u.storeId;
    }
  }
  navigate();
}

function navigate() {
  const hash = window.location.hash.replace('#/', '') || 'dashboard';
  currentPage = hash;
  document.querySelectorAll('.sidebar-link').forEach(l => {
    l.classList.toggle('active', l.dataset.page === hash);
  });
  const titles = { dashboard:'Dashboard', sales:'Продажи', inventory:'Остатки', expenses:'Расходы', visitors:'Посетители', abc:'ABC-анализ', imports:'Импорты', settings:'Настройки' };
  document.getElementById('pageTitle').textContent = titles[hash] || 'Dashboard';
  renderPage(hash);
  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.add('hidden');
}

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebarOverlay');
  sb.classList.toggle('open');
  ov.classList.toggle('hidden');
}

function logout() {
  api.clearAuth();
  showLogin();
}

function onStoreFilterChange() { navigate(); }
function onDateFilterChange() { navigate(); }

async function runBeksarAutoAnalyze(useSelections) {
  const fileInput = document.getElementById('beksarAutoFile');
  const errorEl = document.getElementById('beksarAutoError');
  const resultEl = document.getElementById('beksarAutoResult');
  const importButton = document.getElementById('beksarAutoImportButton');

  errorEl.classList.add('hidden');
  importButton.disabled = true;

  if (!fileInput.files.length) {
    errorEl.textContent = 'Выберите файл';
    errorEl.classList.remove('hidden');
    return;
  }

  const formData = new FormData();
  formData.append('file', fileInput.files[0]);

  if (useSelections) {
    const type = document.getElementById('beksarAutoType')?.value;
    const storeId = document.getElementById('beksarAutoStore')?.value;
    if (type) formData.append('type', type);
    if (storeId) formData.append('storeId', storeId);
  }

  try {
    const result = await postBeksarFile('/beksar/analyze', formData);
    renderBeksarAutoAnalysis(result.data);
  } catch (error) {
    resultEl.classList.add('hidden');
    errorEl.textContent = error.message;
    errorEl.classList.remove('hidden');
  }
}

async function submitBeksarAutoImport() {
  const fileInput = document.getElementById('beksarAutoFile');
  const type = document.getElementById('beksarAutoType')?.value;
  const storeId = document.getElementById('beksarAutoStore')?.value;
  const errorEl = document.getElementById('beksarAutoError');

  errorEl.classList.add('hidden');

  if (!fileInput.files.length || !type || !storeId) {
    errorEl.textContent = 'Выберите файл, тип и магазин';
    errorEl.classList.remove('hidden');
    return;
  }

  const formData = new FormData();
  formData.append('file', fileInput.files[0]);
  formData.append('type', type);
  formData.append('storeId', storeId);

  try {
    await postBeksarFile('/beksar/import/auto', formData);
    closeModal();
    renderImports(document.getElementById('pageContent'));
  } catch (error) {
    errorEl.textContent = error.message;
    errorEl.classList.remove('hidden');
  }
}

async function postBeksarFile(endpoint, formData) {
  const res = await fetch(`${API_BASE}${endpoint}`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${api.token}` },
    body: formData,
  });
  const result = await res.json();

  if (!res.ok) {
    throw new Error(result.error?.message || result.message || 'Request failed');
  }

  return result;
}

async function submitBeksarImport(event) {
  event.preventDefault();

  const errorEl = document.getElementById('beksarImportError');
  errorEl.classList.add('hidden');

  const type = document.getElementById('beksarImportType').value;
  const fileInput = document.getElementById('beksarImportFile');

  if (!fileInput.files.length) {
    errorEl.textContent = 'Выберите файл';
    errorEl.classList.remove('hidden');
    return;
  }

  const formData = new FormData();
  formData.append('file', fileInput.files[0]);
  formData.append('storeId', '2');

  try {
    const endpoint = type === 'sales' ? '/beksar/import/sales' : '/beksar/import/inventory';
    const res = await fetch(`${API_BASE}${endpoint}`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${api.token}` },
      body: formData,
    });
    const result = await res.json();

    if (!res.ok) {
      throw new Error(result.error?.message || result.message || 'Import failed');
    }

    closeModal();
    renderImports(document.getElementById('pageContent'));
  } catch (error) {
    errorEl.textContent = error.message;
    errorEl.classList.remove('hidden');
  }
}

function healthStatusBadge(status) {
  const ok = status === 'ok' || status === 'enabled' || status === true;
  return `<span class="px-2 py-0.5 rounded-full text-xs ${ok ? 'bg-success-500/10 text-success-400' : 'bg-danger-500/10 text-danger-400'}">${ok ? 'OK' : 'Ошибка'}</span>`;
}

function healthMetricCard(label, value, badge = '') {
  return `
    <div class="bg-surface-700/50 rounded-lg p-4">
      <div class="flex items-center justify-between gap-2 mb-2">
        <p class="text-xs text-surface-200">${label}</p>
        ${badge}
      </div>
      <p class="text-lg font-bold text-white">${value}</p>
    </div>
  `;
}

function healthImportCard(title, item) {
  if (!item) {
    return healthMetricCard(title, '—', '<span class="px-2 py-0.5 rounded-full text-xs bg-warn-500/10 text-warn-400">Нет данных</span>');
  }

  const statusClass = item.status === 'success'
    ? 'bg-success-500/10 text-success-400'
    : item.status === 'partial'
      ? 'bg-warn-500/10 text-warn-400'
      : 'bg-danger-500/10 text-danger-400';

  return `
    <div class="bg-surface-700/50 rounded-lg p-4">
      <div class="flex items-center justify-between gap-2 mb-2">
        <p class="text-xs text-surface-200">${title}</p>
        <span class="px-2 py-0.5 rounded-full text-xs ${statusClass}">${item.status}</span>
      </div>
      <p class="text-sm font-medium text-white truncate" title="${escapeHtml(item.fileName)}">${escapeHtml(item.fileName)}</p>
      <p class="text-xs text-surface-200 mt-1">${fmtDateTime(item.importedAt)} · ${fmtCount(item.recordsProcessed)} записей</p>
      ${item.recordsFailed ? `<p class="text-xs text-danger-400 mt-1">Ошибок: ${fmtCount(item.recordsFailed)}</p>` : ''}
    </div>
  `;
}
